name: Lanka Career Hub Bot Run

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Python & Deps
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install selenium requests webdriver-manager

      - name: Run Job Bot
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python job_bot.py

      - name: Save Bot Memory
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add seen_jobs.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update memory [skip ci]"
          git pull --rebase origin main
          git push origin main