name: Run Lanka Career Bot

on:
  schedule:
    - cron: '0 */2 * * *' # සෑම පැය 2කට වරක්ම ස්වයංක්‍රීයව ක්‍රියාත්මක වේ
  workflow_dispatch: # අපට ඕන වෙලාවක බටන් එකක් ඔබලා රන් කරන්නත් පුළුවන්

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Job Bot
        run: python job_bot.py

      - name: Commit and push if seen_jobs.txt changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add seen_jobs.txt
          git commit -m "Update seen jobs list [skip ci]" || echo "No changes to commit"
          git push