name: Lanka Career Hub Bot Run

on:
  schedule:
    - cron: '0 * * * *' # පැයෙන් පැයට ඔටෝ රන් වෙන්න (උඹට ඕන වෙලාවකට වෙනස් කරගන්න පුළුවන්)
  workflow_dispatch: # මැනුවල් රන් කරන්නත් පුළුවන්

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install selenium requests webdriver-manager

      - name: Run Job Bot
        # 🛡️ මෙතන තමයි අපි අර හංගපු Secrets ටික කෝඩ් එකට සම්බන්ධ කරන්නේ! 🦾
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python job_bot.py