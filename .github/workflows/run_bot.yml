name: Lanka Career Hub Bot Run

on:
  schedule:
    - cron: '0 * * * *' # පැයෙන් පැයට
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 🦾 මේක අනිවාර්යයි! GitHub එකට ලියන්න අවසර දෙනවා.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install selenium requests webdriver-manager

      - name: Run Job Bot
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python job_bot.py

      # 🛡️ මෙන්න අලුත් කොටස! අලුත් වෙච්ච seen_jobs.txt එක Repo එකට Push කරනවා.
      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add seen_jobs.txt
          git commit -m "Update seen_jobs list [skip ci]" || echo "No changes to commit"
          git push